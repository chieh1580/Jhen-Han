<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jhen Han's Google</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Arial', sans-serif;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 14px 20px;
      gap: 16px;
    }
    nav a {
      text-decoration: none;
      color: #202124;
      font-size: 13px;
    }
    nav a:hover { text-decoration: underline; }
    .btn-signin {
      background: #1a73e8;
      color: #fff !important;
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-signin:hover { background: #1765cc; text-decoration: none !important; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 100px;
    }

    .logo {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 28px;
      user-select: none;
      text-align: center;
    }
    .logo .name { color: #202124; }
    .logo .apostrophe { color: #202124; }
    .logo span:nth-child(1) { color: #4285f4; }
    .logo span:nth-child(2) { color: #ea4335; }
    .logo span:nth-child(3) { color: #fbbc05; }
    .logo span:nth-child(4) { color: #4285f4; }
    .logo span:nth-child(5) { color: #34a853; }
    .logo span:nth-child(6) { color: #ea4335; }

    .search-wrap {
      position: relative;
      width: 560px;
      max-width: 90vw;
    }
    .search-wrap svg.icon-search {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa0a6;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 48px 12px 48px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      font-size: 16px;
      color: #202124;
      outline: none;
      transition: box-shadow .2s, border-color .2s;
    }
    .search-wrap input:focus {
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .search-wrap:hover input:not(:focus) {
      box-shadow: 0 1px 6px rgba(0,0,0,.2);
      border-color: rgba(223,225,229,0);
    }
    .btn-mic {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #4285f4;
      padding: 4px;
      border-radius: 50%;
    }
    .btn-mic:hover { background: #f1f3f4; }

    .search-actions {
      margin-top: 22px;
      display: flex;
      gap: 10px;
    }
    .search-actions button {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-size: 14px;
      padding: 10px 20px;
      cursor: pointer;
    }
    .search-actions button:hover {
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      border-color: #dadce0;
    }

    .lang-note {
      margin-top: 22px;
      font-size: 13px;
      color: #202124;
    }
    .lang-note a { color: #1a73e8; text-decoration: none; }
    .lang-note a:hover { text-decoration: underline; }

    footer {
      background: #f2f2f2;
      border-top: 1px solid #e4e4e4;
    }
    .footer-top {
      padding: 15px 30px;
      color: #70757a;
      font-size: 14px;
      border-bottom: 1px solid #e4e4e4;
    }
    .footer-bottom {
      display: flex;
      justify-content: space-between;
      padding: 12px 30px;
      font-size: 13px;
      color: #70757a;
    }
    .footer-bottom a {
      color: #70757a;
      text-decoration: none;
      margin-right: 20px;
    }
    .footer-bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="#">Gmail</a>
    <a href="#">圖片</a>
    <a href="#" class="btn-signin">登入</a>
  </nav>

  <main>
    <!-- Logo：Jhen Han's + 彩色 Google -->
    <div class="logo">
      <span class="name">Jhen Han's </span><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <div class="search-wrap">
      <svg class="icon-search" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" autocomplete="off" aria-label="搜尋">
      <button class="btn-mic" title="語音搜尋">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm5.3 11a5.3 5.3 0 0 1-10.6 0H5a7 7 0 0 0 6 6.93V21H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 12h-1.7z"/>
        </svg>
      </button>
    </div>

    <div class="search-actions">
      <button onclick="doSearch()">Jhen Han's Google 搜尋</button>
      <button>好手氣</button>
    </div>

    <div class="lang-note">
      提供的語言：<a href="#">English</a>
    </div>
  </main>

  <footer>
    <div class="footer-top">台灣</div>
    <div class="footer-bottom">
      <div>
        <a href="#">廣告</a>
        <a href="#">商業</a>
        <a href="#">搜尋運作方式</a>
      </div>
      <div>
        <a href="#">隱私權</a>
        <a href="#">條款</a>
        <a href="#">設定</a>
      </div>
    </div>
  </footer>

  <script>
    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (q) window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
    }
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
</body>
</html>
